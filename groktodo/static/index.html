<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <main class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>Todo</h1>
          <p class="tagline">Capture it. Finish it. Move on.</p>
        </div>
      </div>
      <div class="stats" id="stats" aria-live="polite">
        <span class="stat"><strong id="stat-active">0</strong> active</span>
        <span class="stat-dot" aria-hidden="true"></span>
        <span class="stat"><strong id="stat-done">0</strong> done</span>
      </div>
    </header>

    <section class="composer card" aria-label="Add a task">
      <form id="todo-form" autocomplete="off">
        <div class="composer-row">
          <input
            type="text"
            id="title-input"
            name="title"
            placeholder="What needs doing?"
            maxlength="200"
            required
            aria-label="Task title"
          />
          <button type="submit" class="btn btn-primary" id="add-btn">
            Add
          </button>
        </div>
        <div class="composer-meta">
          <label class="field">
            <span>Priority</span>
            <select id="priority-input" name="priority" aria-label="Priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </label>
          <label class="field">
            <span>Due</span>
            <input type="date" id="due-input" name="dueDate" aria-label="Due date" />
          </label>
        </div>
      </form>
    </section>

    <section class="toolbar" aria-label="Filters">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="M20 20l-3.5-3.5"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search tasks…" aria-label="Search tasks" />
      </div>
      <div class="filters" role="tablist" aria-label="Status filter">
        <button type="button" class="filter is-active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button type="button" class="filter" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button type="button" class="filter" data-filter="completed" role="tab" aria-selected="false">Done</button>
      </div>
      <div class="sort-wrap">
        <label class="sr-only" for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="created">Newest</option>
          <option value="priority">Priority</option>
          <option value="due">Due date</option>
          <option value="alpha">A–Z</option>
        </select>
      </div>
    </section>

    <section class="list-panel card" aria-label="Task list">
      <ul id="todo-list" class="todo-list"></ul>
      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-icon" aria-hidden="true">✓</div>
        <h2>All clear</h2>
        <p>Add a task above, or adjust your filters.</p>
      </div>
    </section>

    <footer class="footer">
      <button type="button" id="clear-completed" class="btn btn-ghost" disabled>
        Clear completed
      </button>
      <span class="hint">Double-click a title to edit · Enter to save · Esc to cancel</span>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
